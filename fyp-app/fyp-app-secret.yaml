apiVersion: v1
kind: Secret
metadata:
  name: fyp-app-secret
type: Opaque
stringData:
  # Flask 密鑰
  SECRET_KEY: "just-a-placeholder"

  # PostgreSQL 密碼
  DB_USER: "postgres"
  DB_PASSWORD: "postgres"

  # 郵件登錄資訊 (如果 MailHog 唔使密碼就唔使加)
  # MAIL_USERNAME: <base64 編碼嘅 mail_user>
  # MAIL_PASSWORD: <base64 編碼嘅 mail_pass>

  # API Keys
  # GEMINI_API_KEY: <base64 編碼嘅 Gemini API Key>
