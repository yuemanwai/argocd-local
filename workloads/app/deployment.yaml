apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: app
  namespace: default
  annotations:
    argocd.argoproj.io/ignore-differences: |
      - group: apps
        kind: Deployment
        jsonPointers:
        - /spec/replicas
spec:
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: app
  strategy: {}
  template:
    metadata:
      labels:
        app: app
    spec:
      imagePullSecrets:
        - name: app-secret
      containers:
        - image: docker.io/yuemanwai/fyp-jp:01a3319
          name: app
          # always pull the latest image (for development only)
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
              name: app-secret
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: "0.25"
              memory: 512Mi
            limits:
              cpu: "0.5"
              memory: 1024Mi
          ports:
            - containerPort: 5000
              protocol: TCP
          # 1. Startup Probe: 最先執行，專門俾時間 Python Import 野同建立 DB Pool
          # 只要佢一日未 Pass，Liveness 同 Readiness 唔會搞你
          startupProbe:
            httpGet:
              path: /startup
              port: 5000
            failureThreshold: 30
            periodSeconds: 10
          # 2. Readiness Probe: Startup Pass 左之後，由佢接手
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # 3. Liveness Probe: 最後防線
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
