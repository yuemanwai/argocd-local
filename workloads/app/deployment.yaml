apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: app
  name: app
  namespace: default
  annotations:
    argocd.argoproj.io/ignore-differences: |
      - group: apps
        kind: Deployment
        jsonPointers:
        - /spec/replicas
spec:
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: app
  strategy: {}
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - image: docker.io/yuemanwai/fyp-jp:4857908
          name: app
          # always pull the latest image (for development only)
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: app-secret
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: "0.1"
              memory: 512Mi
            limits:
              cpu: "0.5"
              memory: 1024Mi
          ports:
            - containerPort: 5000
              protocol: TCP
          # Liveness Probe - 檢查應用是否存活
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness Probe - 檢查應用是否就緒
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
