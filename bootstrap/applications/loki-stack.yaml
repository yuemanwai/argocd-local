apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: loki-stack # 指名道姓只無視 loki-stack
      jsonPointers:
        - /spec/volumeClaimTemplates/0/apiVersion
        - /spec/volumeClaimTemplates/0/kind
        - /spec/template/spec/containers/0/resources
    - group: apps
      kind: DaemonSet
      name: loki-stack-promtail
      jsonPointers:
        - /spec/template/spec/containers/0/resources
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki-stack
      targetRevision: 2.10.3
      helm:
        valueFiles:
          - $argocd-local/infrastructure/monitoring/loki-stack-values.yaml

    - repoURL: https://github.com/yuemanwai/argocd-local.git
      targetRevision: HEAD
      ref: argocd-local
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Validate=false
      - PrunePropagationPolicy=foreground
