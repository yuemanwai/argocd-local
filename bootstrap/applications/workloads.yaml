apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/yuemanwai/argocd-local.git
    targetRevision: HEAD
    path: charts/jp # 指向你存放 Chart.yaml 的路徑

    # 這裡可以 Override values.yaml
    helm:
      valueFiles:
        - values.yaml
      # 也可以單獨 override 某個值
      # parameters:
      #   - name: image.tag
      #     value: "v1.0.1"

  destination:
    server: https://kubernetes.default.svc
    namespace: default # 你想 deploy 去邊個 namespace

  # 自動同步設定
  syncPolicy:
    automated:
      prune: true # Git 刪除檔案時，K8s 自動刪除資源
      selfHeal: true # 如果有人手多改 K8s，ArgoCD 自動還原
    syncOptions:
      - CreateNamespace=true
