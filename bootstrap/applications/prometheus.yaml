# yaml-language-server: $schema=https://raw.githubusercontent.com/argoproj/argo-cd/master/manifests/crds/application-crd.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # --- Ignore differences for runtime modifications ---
  ignoreDifferences:
    # Ignore webhook CA bundle updates (managed by cert-manager or Kubernetes)
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
    - group: apps
      kind: DaemonSet
      name: kube-prometheus-stack-prometheus-node-exporter
      jsonPointers:
        - /spec/template/spec/containers/0/resources
    - group: apps
      kind: Deployment
      name: kube-prometheus-stack-grafana
      jsonPointers:
        - /spec/template/spec/containers/0/resources
        - /spec/template/spec/containers/1/resources
  project: default

  # --- 關鍵：多重來源 (Multiple Sources) ---
  sources:
    # 來源 1: 官方 Helm Chart
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 68.4.4 # 建議鎖定版本，唔好用 latest
      helm:
        # 這裡參照下面定義既 "argocd-local"
        valueFiles:
          - $argocd-local/infrastructure/monitoring/values.yaml

    # 來源 2: 你既 Github Repo (存放 values.yaml)
    - repoURL: https://github.com/yuemanwai/argocd-local.git
      targetRevision: HEAD
      ref: argocd-local # 比個名佢，等上面可以用 $argocd-local 黎引用

  # --- 部署目標 ---
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  # --- 同步策略 ---
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
