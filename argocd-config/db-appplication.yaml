apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simulate-db
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    path: simulate-prod-db
    repoURL: https://github.com/yuemanwai/jp-academy-k8s-manifest.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
