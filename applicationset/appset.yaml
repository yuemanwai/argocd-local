apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: k8s-manifest-apps
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - name: app
        path: app
        namespace: default
      - name: db
        path: db
        namespace: default
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/yuemanwai/argocd-local.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - Replace=true
