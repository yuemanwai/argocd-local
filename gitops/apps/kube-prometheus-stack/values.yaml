kube-prometheus-stack:
  # 1. 關閉 Alertmanager (你自己做 Lab 唔洗發 Alert Email，慳好多 RAM)
  alertmanager:
    enabled: false

  # 2. 將 Grafana 變輕
  grafana:
    # 1. 既然手動睇到權限已經係 472，我哋就唔好俾佢再搞事
    initChownData:
      enabled: false

    # 2. 維持非 Root 運行，確保安全
    podSecurityContext:
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472
    enabled: true
    adminUser: admin
    adminPassword: "change-me-grafana-admin-password"
    persistence:
      enabled: true
      type: pvc
      storageClassName: local-path
      accessModes:
        - ReadWriteOnce
      size: 5Gi
    resources:
      limits:
        cpu: 300m
        memory: 1024Mi
      requests:
        cpu: 100m
        memory: 512Mi
    service:
      type: ClusterIP
      nodePort: 32000
      targetPort: 3000
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        searchNamespace: ALL # 掃描所有 namespace
        resources:
          limits:
            memory: 512Mi
            cpu: 100m
          requests:
            memory: 256Mi
            cpu: 50m
    additionalDataSources:
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false
        jsonData:
          timeout: 60s
          maxLines: 1000

  # 3. 大幅閹割 Prometheus
  prometheus:
    service:
      port: 80
      targetPort: 9090
    prometheusSpec:
      ruleSelectorNilUsesHelmValues: false # 重要！等我哋自己定義嘅 recording rules 可以生效
      # 這是關鍵！Minikube 重啟數據無咗就算，唔好用 PV，用 RAM 做 Storage (快 + 慳 IO)
      # storageSpec:
      #   emptyDir:
      #     medium: Memory
      retention: 6h
      resources:
        limits:
          cpu: 500m
          memory: 1024Mi
        requests:
          cpu: 100m
          memory: 512Mi

  # 4. 開返 dashboard 最必要嘅 K8s 監控 (輕量優先)
  kubeApiServer:
    enabled: true
  kubelet:
    enabled: true
    serviceMonitor:
      cAdvisor: true
      # Keep useful cAdvisor series but do not drop container_network_*;
      # this is needed by kubernetes-mixin networking dashboards.
      cAdvisorMetricRelabelings:
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_cpu_(cfs_throttled_seconds_total|load_average_10s|system_seconds_total|user_seconds_total)'
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)'
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_memory_(mapped_file|swap)'
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_(file_descriptors|tasks_state|threads_max)'
        - sourceLabels: [__name__, scope]
          action: drop
          regex: 'container_memory_failures_total;hierarchy'
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_network_(receive|transmit)_(compressed|multicast|collisions|fifo|frame|carrier|nohandler)_total'
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_network_(receive|transmit)_packets_total'
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_spec.*'
        - sourceLabels: [id, pod]
          action: drop
          regex: '.+;'
  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true

  # 5. 對必需 exporter 加低資源 request/limit，避免再推高 RAM
  kube-state-metrics:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 150m
        memory: 256Mi
  prometheus-node-exporter:
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

  # 6. 一口氣開齊 control-plane 監控 (學習 observability 全貌)
  kubeControllerManager:
    enabled: true
  kubeEtcd:
    enabled: true
  kubeScheduler:
    enabled: true
  coreDns:
    enabled: true
  kubeProxy:
    enabled: true

