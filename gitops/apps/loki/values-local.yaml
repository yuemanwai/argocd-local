# gitops/apps/loki/values-local.yaml

# 第一層：Wrapper Dependency Name (一定要叫 loki)
loki:
  deploymentMode: SingleBinary

  # ==========================================
  # 【關鍵修正】明確將 Scalable 组件歸零
  # 否則官方 Default 會係 3，導致 Validation 衝突
  # ==========================================
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  # ==========================================
  # === 新增：關閉 Cache 組件 ===
  # 這些組件在 Local 單機版是 Overkill，關掉它們省 RAM
  chunksCache:
    enabled: false

  resultsCache:
    enabled: false
  # ===========================

  # 這是給 SingleBinary 用的配置
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi

  # Loki 核心配置
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1

    # 這裡照樣填 Dummy Bucket Name 騙過 Template Check
    storage:
      type: "filesystem"
      bucketNames:
        chunks: "chunks"
        ruler: "ruler"
        admin: "admin"

    schemaConfig:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

  # 關閉其他雜項
  minio:
    enabled: false

  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    lokiCanary:
      enabled: false

# Promtail 設定 (與 loki dependency 同級)
promtail:
  enabled: true
  config:
    clients:
      - url: http://loki-loki:3100/loki/api/v1/push
