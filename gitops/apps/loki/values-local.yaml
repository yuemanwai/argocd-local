# gitops/apps/loki/values-local.yaml

# 1. 第一層 loki: 指向 Wrapper Chart.yaml 裡面的 dependency name
loki:
  deploymentMode: SingleBinary

  # 2. 第二層 loki: 這是 Loki Chart 內部的 configuration section
  loki:
    auth_enabled: false

    commonConfig:
      replication_factor: 1

    storage:
      type: "filesystem"
      # === Fix Start: 餵假資料過 Validation ===
      # 雖然用 filesystem，但為了滿足 Template 檢查，我們隨便填
      bucketNames:
        chunks: chunks
        ruler: ruler
        admin: admin
      # === Fix End ===

    schemaConfig:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

  # 關閉 Local 不需要的功能
  minio:
    enabled: false

  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    lokiCanary:
      enabled: false

# 3. Promtail 設定 (同級)
promtail:
  enabled: true
  config:
    clients:
      - url: http://loki-loki:3100/loki/api/v1/push
