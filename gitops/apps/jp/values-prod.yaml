# ================================================================
# values-prod.yaml (For AWS EKS Production Environment)
# ================================================================

# 1. 關閉 Local DB，改用 AWS RDS
localdb:
  enabled: false

# 因為 EKS (Prod) 無裝 Prometheus Operator，所以必須關閉 ServiceMonitor
serviceMonitor:
  enabled: false

# (如果你個 dashboard: enabled: true 都會出事，順手熄埋佢)
dashboard:
  enabled: false

# 2. 開啟 AWS 專屬嘅 ServiceAccount (IRSA 綁定)
serviceAccount:
  create: true
  name: webapp-sa
  annotations:
    # 呢度可以寫 dummy value，因為 Terraform ArgoCD Parameters 會負責 Override 佢！
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/irsa-rds-role"

# 3. AWS 環境變數 (呢兩個都係留空，由 Terraform 動態注入)
env:
  awsSecretName: ""
  awsRegion: ""

# 4. Database 連線資訊 (呢兩個都係留空，由 Terraform 動態注入)
database:
  host: ""
  name: ""
  port: 5432 # 雖然 Terraform 無俾，但寫定喺度最穩陣

# 5. Production 級別嘅資源分配 (你可以根據 t3.medium 嘅負荷微調)
resources:
  requests:
    cpu: "0.1"
    memory: 512Mi
  limits:
    cpu: "0.5"
    memory: 1024Mi

# 6. (選填) 如果你準備好要打開 Ingress，就 Uncomment 下面。
# 如果你想跟之前計劃，先 Port-forward 測試，就 Keep 住 enabled: false
ingress:
  enabled: false
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /healthz # 建議跟返你 Python App 嘅 health check 路徑
    alb.ingress.kubernetes.io/success-codes: 200-399
    alb.ingress.kubernetes.io/manage-backend-security-group-rules: "true"
    alb.ingress.kubernetes.io/target-type: ip
  hosts:
    - host: ashleyyue.me
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - ashleyyue.me
