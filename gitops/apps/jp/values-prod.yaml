localdb:
  enabled: false

replicaCount: 1

autoscaling:
  enabled: false

resources:
  requests:
    cpu: "0.1"
    memory: 512Mi
  limits:
    cpu: "0.5"
    memory: 1024Mi

containerPort: 5000

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

serviceAccount:
  create: true
  name: webapp-sa
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/irsa-rds-role

env:
  awsSecretName: arn:aws:secretsmanager:ap-southeast-1:123456789012:secret:jp-prod-db-secret
  awsRegion: ap-southeast-1

database:
  host: jp-prod-db.cluster-xxxxxxxxxxxx.ap-southeast-1.rds.amazonaws.com
  name: jp

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/success-codes: 200-399
    alb.ingress.kubernetes.io/manage-backend-security-group-rules: "true"
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-1:123456789012:certificate/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    alb.ingress.kubernetes.io/target-type: ip
  hosts:
    - host: jp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - jp.example.com
