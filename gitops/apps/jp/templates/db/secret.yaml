{{- if .Values.localdb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jp.fullname" . }}-db
  labels:
    {{- include "jp.labels" . | nindent 4 }}
    component: database
  annotations:
    argocd.argoproj.io/sync-wave: "-2"

type: Opaque
stringData:
    POSTGRES_USER: {{ .Values.database.username | quote }}
    POSTGRES_PASSWORD: {{ .Values.database.password | quote }}
{{- end }}