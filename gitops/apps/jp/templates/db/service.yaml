apiVersion: v1
kind: Service
metadata:
  name: {{ include "jp.fullname" . }}-db
  labels:
    {{- include "jp.labels" . | nindent 4 }}
    component: database
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ports:
  - name: postgres
    port: {{ .Values.database.port }}
    protocol: TCP
    targetPort: {{ .Values.database.port }}
  selector:
    {{- include "jp.selectorLabels" . | nindent 4 }}
    component: database
  type: ClusterIP
  clusterIP: None