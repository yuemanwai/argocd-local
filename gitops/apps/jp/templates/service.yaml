apiVersion: v1
kind: Service
metadata:
  name: {{ include "jp.fullname" . }}
  labels:
    {{- include "jp.labels" . | nindent 4 }}
    component: app
spec:
  {{- $targetPort := .Values.service.targetPort | default .Values.containerPort }}
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ $targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "jp.selectorLabels" . | nindent 4 }}
    component: app
