apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "jp.fullname" . }}-test-connection"
  labels:
    {{- include "jp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "jp.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
