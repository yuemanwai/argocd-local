# secret.yaml
{{- if not .Values.secret.existingSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jp.fullname" . }}
  labels:
    {{- include "jp.labels" . | nindent 4 }}
type: Opaque
stringData:
  # 只有喺 localdb 開啟時，先強行注入 DB 密碼落 Secret
  {{- if .Values.localdb.enabled }}
  DB_USERNAME: {{ .Values.database.username | quote }}
  DB_PASSWORD: {{ .Values.database.password | quote }}
  {{- end }}
  
  # 其他 App 級別嘅 Secret (SECRET_KEY, GEMINI_API_KEY 等) 永遠都要注入
  {{- with .Values.secret }}
  {{- range $key, $value := . }}
  {{- if and (ne $key "existingSecretName") (ne $key "DB_USERNAME") (ne $key "DB_PASSWORD") }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}