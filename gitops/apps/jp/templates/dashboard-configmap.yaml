{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jp.fullname" . }}-dashboard
  labels:
    {{- include "jp.labels" . | nindent 4 }}
    # 這是重點！這行 Label 告訴 Grafana Sidecar：「我是 Dashboard，請吃了我」
    # 注意：這個 Label key/value 必須配合你安裝 kube-prometheus-stack 時的設定
    # 預設通常是 grafana_dashboard: "1"
    grafana_dashboard: "1"
data:
  # 這是魔法：自動讀取 dashboards/ folder 下的 JSON 檔案內容，並替換 datasource 變數
  flask-monitoring.json: |
    {{- .Files.Get "dashboards/flask-monitoring.json" | replace "${DS_PROMETHEUS}" (.Values.dashboard.datasourceUid | default "prometheus") | nindent 4 }}
  hpa-dashboard.json: |
    {{- .Files.Get "dashboards/hpa-dashboard.json" | replace "${DS_PROMETHEUS}" (.Values.dashboard.datasourceUid | default "prometheus") | nindent 4 }}
  argo-dashboard.json: |
    {{- .Files.Get "dashboards/argo-dashboard.json" | replace "${DS_PROMETHEUS}" (.Values.dashboard.datasourceUid | default "prometheus") | nindent 4 }}
  flask-transaction.json: |
    {{- .Files.Get "dashboards/flask-transaction.json" | replace "${DS_PROMETHEUS}" (.Values.dashboard.datasourceUid | default "prometheus") | nindent 4 }}
{{- end }}