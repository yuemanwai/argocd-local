# yaml-language-server: $schema=https://raw.githubusercontent.com/argoproj/argo-cd/master/manifests/crds/application-crd.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"

spec:
  # ignoreDifferences:
  #   - group: apps
  #     kind: StatefulSet
  #     name: loki
  #     jsonPointers:
  #       - /spec/volumeClaimTemplates/0/apiVersion
  #       - /spec/volumeClaimTemplates/0/kind
  #       - /spec/template/spec/containers/0/resources
  #   - group: apps
  #     kind: DaemonSet
  #     name: loki-stack-promtail
  #     jsonPointers:
  #       - /spec/template/spec/containers/0/resources
  
  project: default
  sources:
    repoURL: {{ .Values.spec.source.repoURL }}
    path: gitops/apps/loki
      targetRevision: HEAD
 
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: monitoring
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Validate=false
      - PrunePropagationPolicy=foreground
