# yaml-language-server: $schema=https://raw.githubusercontent.com/argoproj/argo-cd/master/manifests/crds/application-crd.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"

spec:
  {{- $stage := default "local" .Values.env.stage }}
  {{- $useProdValues := eq $stage "prod" }}
  project: default
  source:
    repoURL: {{ .Values.spec.source.repoURL }}
    targetRevision: HEAD
    path: gitops/apps/jp
    helm:
      valueFiles:
        - values.yaml
        {{- if $useProdValues }}
        - values-prod.yaml
        {{- end }}

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
