apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "fyp-app.fullname" . }}
  labels:
    {{- include "fyp-app.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "fyp-app.selectorLabels" . | nindent 6 }}