apiVersion: v1
kind: Service
metadata:
  name: {{ include "jp.fullname" . }}-db
  labels:
    {{- include "jp.labels" . | nindent 4 }}
    component: database
spec:
  ports:
  - name: postgres
    port: 5432
    protocol: TCP
    targetPort: 5432
  selector:
    {{- include "jp.selectorLabels" . | nindent 4 }}
    component: database
  type: ClusterIP
  clusterIP: None