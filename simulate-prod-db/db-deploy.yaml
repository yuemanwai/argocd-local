apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: db
  name: db
  namespace: default
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - image: postgres:16-bookworm
        name: postgres
        envFrom:
        - secretRef:
            name: db-secret
        - configMapRef:
            name: db-config
        resources:
          requests:
            cpu: "0.25"
            memory: 256Mi
          limits:
            cpu: "0.5"
            memory: 512Mi
        ports:
        - containerPort: 5432
          protocol: TCP
